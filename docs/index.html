<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT News Hub — クラウド・AI・インフラ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161920;
    --border: #232730;
    --border-hover: #363d4e;
    --text: #e8ecf0;
    --muted: #7a8494;
    --accent: #4f9cf9;
    --tag-aws: #FF9900;
    --tag-zenn: #3EA8FF;
    --tag-gcp: #4285F4;
    --tag-azure: #0078D4;
    --tag-hn: #FF6600;
    --tag-ai: #10A37F;
    --tag-infra: #009688;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans JP', sans-serif;
    --head: 'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(13,15,18,0.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-family: var(--head);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  #updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* Filter bar */
  .filters {
    padding: 16px 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 56px;
    z-index: 99;
  }
  .filter-btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* Search */
  .search-wrap {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  /* Grid */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
  }
  #count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* Card */
  .card {
    background: var(--surface);
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: background 0.15s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .card:hover { background: #1c2030; }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    color: #fff;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .source-name {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
  }
  .card:hover .card-title { color: var(--accent); }
  .card-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-date {
    font-family: var(--mono);
    font-size: 10px;
    color: #4a5568;
    margin-top: auto;
  }

  /* Empty */
  #empty {
    display: none;
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
    font-size: 13px;
  }

  /* Loading */
  #loading {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header { padding: 0 16px; }
    .filters, .search-wrap, main { padding-left: 16px; padding-right: 16px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <span class="logo-dot"></span>
    IT News Hub
  </a>
  <span id="updated">読み込み中...</span>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-tag="ALL">ALL</button>
  <button class="filter-btn" data-tag="AWS">AWS</button>
  <button class="filter-btn" data-tag="Zenn">Zenn</button>
  <button class="filter-btn" data-tag="GCP">GCP</button>
  <button class="filter-btn" data-tag="Azure">Azure</button>
  <button class="filter-btn" data-tag="HN">Hacker News</button>
  <button class="filter-btn" data-tag="AI">AI</button>
  <button class="filter-btn" data-tag="インフラ">インフラ</button>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="キーワードで絞り込む..." autocomplete="off">
</div>

<main>
  <div id="loading"><div class="spinner"></div>フィードを読み込んでいます...</div>
  <div id="count" style="display:none"></div>
  <div class="grid" id="grid"></div>
  <div id="empty">該当する記事が見つかりませんでした</div>
</main>

<script>
let allItems = [];
let activeTag = 'ALL';
let searchQuery = '';

function formatDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 3600)  return `${Math.floor(diff/60)}分前`;
  if (diff < 86400) return `${Math.floor(diff/3600)}時間前`;
  if (diff < 604800) return `${Math.floor(diff/86400)}日前`;
  return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
}

function render() {
  const q = searchQuery.toLowerCase();
  const filtered = allItems.filter(item => {
    const tagMatch = activeTag === 'ALL' || item.tag === activeTag;
    const textMatch = !q || item.title.toLowerCase().includes(q) || item.summary.toLowerCase().includes(q);
    return tagMatch && textMatch;
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');

  count.style.display = 'block';
  count.textContent = `${filtered.length} 件`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(item => `
    <a class="card" href="${item.link}" target="_blank" rel="noopener">
      <div class="card-meta">
        <span class="tag" style="background:${item.color}">${item.tag}</span>
        <span class="source-name">${item.source}</span>
      </div>
      <div class="card-title">${item.title}</div>
      ${item.summary ? `<div class="card-summary">${item.summary}</div>` : ''}
      <div class="card-date">${formatDate(item.published)}</div>
    </a>
  `).join('');
}

async function load() {
  try {
    const res = await fetch('news.json?_=' + Date.now());
    const data = await res.json();
    allItems = data.items || [];
    const d = new Date(data.updated);
    document.getElementById('updated').textContent =
      'Updated: ' + d.toLocaleString('ja-JP', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    document.getElementById('loading').style.display = 'none';
    render();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p style="color:#E24B4A">news.json の読み込みに失敗しました</p>';
  }
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTag = btn.dataset.tag;
  render();
});

let timer;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(timer);
  timer = setTimeout(() => { searchQuery = e.target.value; render(); }, 200);
});

load();
</script>
</body>
</html>
